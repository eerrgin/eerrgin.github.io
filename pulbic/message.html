<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Ergin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        .contact-card {
            background: var(--card-bg);
            padding: 48px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .header h2 { font-size: 28px; margin: 0; letter-spacing: -0.5px; }
        .header p { color: var(--text-sub); margin-top: 8px; margin-bottom: 32px; font-size: 15px; }

        /* Gizli Admin Noktası */
        #secret-login-dot { cursor: pointer; color: #cbd5e1; font-size: 10px; opacity: 0.5; user-select: none; }

        input, textarea {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.2s ease;
            background: #fcfcfc;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        #send-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        #send-btn:hover { background-color: #4f46e5; }
        #send-btn:active { transform: scale(0.98); }

        .back-link { display: block; margin-top: 24px; color: var(--text-sub); text-decoration: none; font-size: 13px; font-weight: 500; }
        .back-link:hover { color: var(--text-main); }

        /* Admin Gelen Kutusu (Modal) */
        .admin-modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; }
        .admin-content { background: white; padding: 40px; border-radius: 16px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; text-align: left; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 20px; cursor: pointer; color: #94a3b8; }
        
        .msg-item { border-bottom: 1px solid #f1f5f9; padding: 16px 0; }
        .msg-item strong { display: block; color: var(--text-main); margin-bottom: 4px; }
        .msg-date { font-size: 11px; color: #94a3b8; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>

    <div class="contact-card">
        <div class="header">
            <h2>Contact Me <span id="secret-login-dot">.</span></h2>
            <p>Send a message to Ergin</p>
        </div>
        <input type="text" id="sender-name" placeholder="Name" required>
        <textarea id="sender-msg" rows="4" placeholder="Your message..." required></textarea>
        <button id="send-btn">Send Message</button>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <div id="admin-modal" class="admin-modal">
        <div class="admin-content">
            <span class="close-btn" id="close-admin">✕</span>
            <h2 style="margin-top: 0; font-size: 20px;">Inbox (Admin)</h2>
            <div id="message-list"><p style="color: #666;">Loading...</p></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWhFIvkzjW17aeJT7LQkQtATE6AKtGDGE",
            authDomain: "eerrgin-site.firebaseapp.com",
            projectId: "eerrgin-site",
            storageBucket: "eerrgin-site.firebasestorage.app",
            messagingSenderId: "588154027449",
            appId: "1:588154027449:web:fc95ce4cffc35f351b8a68"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const adminModal = document.getElementById("admin-modal");
        const secretDot = document.getElementById("secret-login-dot");
        const sendBtn = document.getElementById("send-btn");

        document.getElementById("close-admin").onclick = () => adminModal.style.display = "none";
        
        sendBtn.onclick = async () => {
            const name = document.getElementById("sender-name").value;
            const msg = document.getElementById("sender-msg").value;
            if(!name || !msg) return alert("Please fill all fields.");
            
            sendBtn.innerText = "Sending...";
            try {
                await addDoc(collection(db, "messages"), { name, message: msg, timestamp: serverTimestamp() });
                sendBtn.innerText = "Sent Successfully";
                setTimeout(() => { sendBtn.innerText = "Send Message"; document.getElementById("sender-name").value = ""; document.getElementById("sender-msg").value = ""; }, 2000);
            } catch (e) { alert("Error!"); sendBtn.innerText = "Send Message"; }
        };

        secretDot.onclick = async () => {
            if (prompt("Access Code:") === "1845") {
                adminModal.style.display = "flex";
                const snap = await getDocs(query(collection(db, "messages"), orderBy("timestamp", "desc")));
                document.getElementById("message-list").innerHTML = snap.empty ? "No messages." : "";
                snap.forEach((doc) => {
                    const d = doc.data();
                    document.getElementById("message-list").innerHTML += `<div class="msg-item"><strong>${d.name}</strong><span class="msg-date">${d.timestamp ? d.timestamp.toDate().toLocaleString('tr-TR') : ""}</span>${d.message}</div>`;
                });
            }
        };
    </script>
</body>
</html>
