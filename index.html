<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- SEO & İndeksleme -->
  <title>eerrgin • Premium Builder | Ergin Kaplan</title>
  <meta name="description" content="App Developer & AI Explorer. Personal portfolio of Ergin Kaplan.">
  <meta name="author" content="Ergin Kaplan">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap');
    
    body { font-family: 'Space Grotesk', sans-serif; background-color: #050505; color: #ffffff; cursor: none; overflow-x: hidden; }
    .bg-grid { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; pointer-events: none; }
    
    /* Özel İmleç */
    .cursor-dot, .cursor-outline { position: fixed; top: 0; left: 0; transform: translate(-50%, -50%); border-radius: 50%; z-index: 9999; pointer-events: none; }
    .cursor-dot { width: 8px; height: 8px; background-color: #22d3ee; }
    .cursor-outline { width: 40px; height: 40px; border: 1px solid rgba(34, 211, 238, 0.5); transition: width 0.2s, height 0.2s; }

    /* Admin Modal */
    .admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
    .admin-content { background: #111; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; text-align: left; border: 1px solid #333; }
    .msg-item { background: #1a1a1a; padding: 15px; margin-bottom: 10px; border-radius: 8px; font-size: 14px; border-left: 3px solid #22d3ee; }
  </style>
</head>
<body class="relative">

  <div class="bg-grid"></div>
  <div class="cursor-dot" id="cursor-dot"></div>
  <div class="cursor-outline" id="cursor-outline"></div>

  <!-- Üst Navigasyon -->
  <nav class="fixed top-0 w-full p-6 flex justify-between items-center z-50">
    <div class="text-xl font-bold tracking-tighter">eerrgin<span class="text-cyan-400">.</span></div>
    <a href="contact.html" class="px-6 py-2 bg-zinc-900/80 border border-zinc-700 hover:border-cyan-500 hover:bg-cyan-950/20 text-white font-semibold rounded-full transition-all duration-300 shadow-lg backdrop-blur-md flex items-center gap-2">
      <i class="fa-solid fa-envelope text-sm"></i> Message Ergin
    </a>
  </nav>

  <!-- Ana İçerik -->
  <section class="min-h-screen flex items-center justify-center pt-20">
    <div class="max-w-6xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
      <div class="text-left">
        <h1 class="text-6xl md:text-8xl font-bold tracking-tighter mb-4">eerrgin<span class="text-cyan-400">.</span></h1>
        <p class="text-2xl text-gray-300 font-light mb-6">App Developer & AI Explorer</p>
        <p class="text-lg text-gray-500 mb-10">Tinkering with AI and web architectures.</p>
        <div class="flex gap-4">
           <a href="https://github.com/eerrgin" target="_blank" class="px-8 py-4 bg-white text-black font-bold rounded-xl hover:bg-cyan-400 transition-all">GitHub</a>
        </div>
      </div>
      <div class="flex justify-center">
        <img src="https://raw.githubusercontent.com/eerrgin/eerrgin.github.io/refs/heads/main/12.jpg" class="w-64 h-64 md:w-80 md:h-80 object-cover rounded-2xl grayscale hover:grayscale-0 transition-all duration-700">
      </div>
    </div>
  </section>

  <!-- Footer ve Şifreli Admin Girişi -->
  <footer class="py-12 text-center text-gray-600 text-sm">
    <p>© <span id="admin-trigger" class="cursor-pointer hover:text-white transition-colors duration-300">2026</span> eerrgin • Code & Architecture</p>
  </footer>

  <!-- Admin Paneli (Gizli) -->
  <div id="admin-modal" class="admin-modal">
    <div class="admin-content">
      <h2 class="text-xl font-bold mb-4">Admin Inbox</h2>
      <div id="message-list"><p>Loading...</p></div>
      <button onclick="document.getElementById('admin-modal').style.display='none'" class="mt-4 px-4 py-2 bg-red-900/20 text-red-400 rounded">Close</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAWhFIvkzjW17aeJT7LQkQtATE6AKtGDGE", authDomain: "eerrgin-site.firebaseapp.com", projectId: "eerrgin-site", storageBucket: "eerrgin-site.firebasestorage.app", messagingSenderId: "588154027449", appId: "1:588154027449:web:fc95ce4cffc35f351b8a68" };
    const db = getFirestore(initializeApp(firebaseConfig));

    // Admin Giriş Tetikleyici
    document.getElementById("admin-trigger").onclick = async () => {
      if (prompt("Access Code:") === "1845") {
        document.getElementById("admin-modal").style.display = "flex";
        const snap = await getDocs(query(collection(db, "messages"), orderBy("timestamp", "desc")));
        const list = document.getElementById("message-list");
        list.innerHTML = snap.empty ? "No messages." : "";
        snap.forEach((doc) => {
          const d = doc.data();
          list.innerHTML += `<div class="msg-item"><strong>${d.name}</strong><small class="text-gray-500 block">${d.timestamp?.toDate().toLocaleString() || ""}</small>${d.message}</div>`;
        });
      }
    };

    // İmleç ve diğer animasyon kodların buraya eklenecek...
  </script>
</body>
</html>
