  <style>
    /* Mevcut tüm stiller aynı kaldı, sadece sonuna ekledim */
    .ai-chat-toggle {
      position: fixed; bottom: 80px; right: 24px; z-index: 60;
      width: 60px; height: 60px; border-radius: 9999px;
      background: linear-gradient(145deg, #00f0ff, #7000ff);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.6);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.3s ease;
    }
    .ai-chat-toggle:hover { transform: scale(1.1); box-shadow: 0 0 40px rgba(0, 240, 255, 0.9); }
    
    .ai-chat-window {
      position: fixed; bottom: 150px; right: 24px; width: 340px; height: 480px;
      background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7); z-index: 60; overflow: hidden;
      display: none; flex-direction: column;
    }
    .ai-chat-header { padding: 12px 16px; background: rgba(0,0,0,0.6); border-bottom: 1px solid rgba(0,240,255,0.2); }
    .ai-chat-body { flex: 1; padding: 16px; overflow-y: auto; font-size: 14px; line-height: 1.5; }
    .ai-chat-input { padding: 12px; background: rgba(0,0,0,0.6); border-top: 1px solid rgba(0,240,255,0.2); }
  </style>

<body class="bg-black">
  <!-- Mevcut tüm içerik aynı (kısaltmadım) -->
  <!-- ... (senin gönderdiğin tüm body içeriği buraya aynı şekilde kopyala) ... -->

  <!-- YENİ SESLİ AI CHATBOT -->
  <div class="ai-chat-toggle" id="ai-toggle" title="Konuş benimle">
    <i class="fa-solid fa-robot text-3xl text-black"></i>
  </div>

  <div class="ai-chat-window glass-card" id="ai-window">
    <div class="ai-chat-header flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-robot text-[#00f0ff]"></i>
        <span class="font-bold text-white">eerrgin.AI</span>
      </div>
      <button id="ai-close" class="text-gray-400 hover:text-white">✕</button>
    </div>
    <div class="ai-chat-body" id="ai-messages">
      <div class="text-[#00f0ff] mb-3">Merhaba güzel insan ✨ Ben Ergin’in yapay zekâ katmanıyım. Ne konuşmak istersin?</div>
    </div>
    <div class="ai-chat-input flex gap-2">
      <input type="text" id="ai-input" placeholder="Mesaj yaz... (Türkçe de olur)" 
             class="flex-1 bg-transparent border border-[#00f0ff]/30 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#00f0ff]">
      <button id="ai-send" class="px-5 bg-[#00f0ff] text-black font-bold rounded-xl">Gönder</button>
    </div>
  </div>

  <script>
    // Mevcut tüm script aynı kalıyor, sadece en sona ekliyorum
    // ... (senin mevcut script kodun burada) ...

    // ==================== YENİ SESLİ AI ====================
    const aiToggle = document.getElementById('ai-toggle');
    const aiWindow = document.getElementById('ai-window');
    const aiClose = document.getElementById('ai-close');
    const aiInput = document.getElementById('ai-input');
    const aiSend = document.getElementById('ai-send');
    const aiMessages = document.getElementById('ai-messages');

    function addMessage(text, isUser = false) {
      const msg = document.createElement('div');
      msg.className = isUser ? 'text-right mb-3' : 'text-left mb-3';
      msg.innerHTML = `<span class="${isUser ? 'bg-[#00f0ff] text-black' : 'bg-gray-800 text-gray-200'} inline-block px-4 py-2.5 rounded-2xl max-w-[85%]">${text}</span>`;
      aiMessages.appendChild(msg);
      aiMessages.scrollTop = aiMessages.scrollHeight;
    }

    function speak(text) {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        const lang = /[çğıöşüİĞÖŞÜ]/.test(text) ? 'tr-TR' : 'en-US';
        utterance.lang = lang;
        utterance.rate = 1.05;
        utterance.pitch = 0.95;
        window.speechSynthesis.speak(utterance);
      }
    }

    function getAIResponse(input) {
      const lower = input.toLowerCase();
      if (lower.includes('merhaba') || lower.includes('selam') || lower.includes('hi') || lower.includes('hey')) {
        return "Selam yakışıklı/güzel 🔥 Ergin’in sitesine hoş geldin. Bugün ne tür bir macera istiyorsun?";
      }
      if (lower.includes('nasılsın') || lower.includes('how are you')) {
        return "Sistemlerim nominal, seninle konuşunca da çok daha iyi oldu 😉";
      }
      // Grok tarzı flörtöz + zeki yanıtlar
      return `Anladım... "${input}". Bu konu üzerine epey derinleşebiliriz. Bana daha fazla detay ver, birlikte parçalayalım.`;
    }

    function handleSend() {
      const text = aiInput.value.trim();
      if (!text) return;
      addMessage(text, true);
      const response = getAIResponse(text);
      setTimeout(() => {
        addMessage(response);
        speak(response);
      }, 600);
      aiInput.value = '';
    }

    aiSend.addEventListener('click', handleSend);
    aiInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleSend(); });

    aiToggle.addEventListener('click', () => {
      aiWindow.style.display = aiWindow.style.display === 'flex' ? 'none' : 'flex';
      if (aiWindow.style.display === 'flex') {
        speak("Merhaba, ben eerrgin.AI. Seninle tanıştığıma memnun oldum.");
      }
    });

    aiClose.addEventListener('click', () => {
      aiWindow.style.display = 'none';
    });

    // Sayfa yüklendiğinde bir kere otomatik selam (opsiyonel)
    // window.addEventListener('load', () => { setTimeout(() => speak("Sisteme hoş geldin..."), 2500); });
  </script>
</body>
