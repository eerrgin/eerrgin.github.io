<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | eerrgin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #050505; color: #fff; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid #333; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <!-- Giriş Ekranı -->
    <div id="login-screen" class="w-full max-w-sm glass p-8 rounded-2xl text-center">
        <h2 class="text-2xl font-bold mb-6 text-cyan-400">Admin Access</h2>
        <input type="password" id="pass-input" placeholder="Enter Access Code" class="w-full p-3 mb-4 bg-zinc-900 border border-zinc-700 rounded-lg text-white text-center">
        <button id="login-btn" class="w-full p-3 bg-cyan-600 hover:bg-cyan-500 rounded-lg font-bold transition-all">Unlock Dashboard</button>
    </div>

    <!-- Admin Paneli (Başlangıçta gizli) -->
    <div id="dashboard" class="hidden w-full max-w-2xl glass p-8 rounded-2xl">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold">Message Inbox</h1>
            <button onclick="location.reload()" class="text-sm text-gray-500 hover:text-white">Refresh</button>
        </div>
        <div id="message-list" class="space-y-4">
            <p class="text-gray-500">Loading data...</p>
        </div>
        <a href="index.html" class="block mt-8 text-center text-sm text-gray-600 hover:text-white">← Return to Main Site</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAWhFIvkzjW17aeJT7LQkQtATE6AKtGDGE", 
            authDomain: "eerrgin-site.firebaseapp.com", 
            projectId: "eerrgin-site", 
            storageBucket: "eerrgin-site.firebasestorage.app", 
            messagingSenderId: "588154027449", 
            appId: "1:588154027449:web:fc95ce4cffc35f351b8a68" 
        };
        const db = getFirestore(initializeApp(firebaseConfig));

        const loginBtn = document.getElementById("login-btn");
        const loginScreen = document.getElementById("login-screen");
        const dashboard = document.getElementById("dashboard");
        const messageList = document.getElementById("message-list");

        loginBtn.onclick = async () => {
            const pass = document.getElementById("pass-input").value;
            if (pass === "1845") {
                loginScreen.classList.add("hidden");
                dashboard.classList.remove("hidden");
                
                const q = query(collection(db, "messages"), orderBy("timestamp", "desc"));
                const snap = await getDocs(q);
                
                messageList.innerHTML = snap.empty ? "<p class='text-center'>No messages.</p>" : "";
                snap.forEach((doc) => {
                    const d = doc.data();
                    messageList.innerHTML += `
                        <div class="p-4 bg-zinc-900 border border-zinc-800 rounded-xl">
                            <strong class="text-cyan-400 block">${d.name}</strong>
                            <small class="text-gray-500">${d.timestamp?.toDate().toLocaleString() || "Date Error"}</small>
                            <p class="mt-2 text-gray-200">${d.message}</p>
                        </div>
                    `;
                });
            } else {
                alert("Access Denied.");
            }
        };
    </script>
</body>
</html>
