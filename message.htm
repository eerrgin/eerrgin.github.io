<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Ergin</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .contact-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; position: relative; }
        .contact-card h2 { margin-top: 0; color: #333; font-size: 24px; margin-bottom: 5px; }
        #secret-login-dot { cursor: pointer; color: #ccc; font-size: 14px; opacity: 0.1; user-select: none; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 14px; background-color: #f9f9f9; }
        input:focus, textarea:focus { outline: none; border-color: #4CAF50; background-color: white; }
        #send-btn { width: 100%; padding: 14px; background-color: #2b2b2b; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #send-btn:hover { background-color: #4CAF50; }
        .admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .admin-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; text-align: left; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #888; }
        .msg-item { background: #f8f9fa; border-left: 4px solid #2b2b2b; padding: 15px; margin-bottom: 15px; border-radius: 4px; font-size: 14px; }
        .msg-item strong { color: #2b2b2b; display: block; margin-bottom: 5px;}
        .msg-date { font-size: 11px; color: #999; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>

    <div class="contact-card">
        <h2>Contact Me <span id="secret-login-dot">.</span></h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Ergin'e mesaj gönderin</p>
        <input type="text" id="sender-name" placeholder="Your Name" required>
        <textarea id="sender-msg" rows="5" placeholder="Write your message here..." required></textarea>
        <button id="send-btn">Send Message</button>
        <a href="index.html" style="display: block; margin-top: 15px; color: #888; text-decoration: none; font-size: 13px;">← Back to Home</a>
    </div>

    <div id="admin-modal" class="admin-modal">
        <div class="admin-content">
            <span class="close-btn" id="close-admin">&times;</span>
            <h2 style="margin-top: 0;">Inbox (Admin)</h2>
            <div id="message-list"><p style="color: #666; font-size: 14px;">Loading messages...</p></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWhFIvkzjW17aeJT7LQkQtATE6AKtGDGE",
            authDomain: "eerrgin-site.firebaseapp.com",
            projectId: "eerrgin-site",
            storageBucket: "eerrgin-site.firebasestorage.app",
            messagingSenderId: "588154027449",
            appId: "1:588154027449:web:fc95ce4cffc35f351b8a68"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const adminModal = document.getElementById("admin-modal");
        const secretDot = document.getElementById("secret-login-dot");
        const closeAdmin = document.getElementById("close-admin");
        const sendBtn = document.getElementById("send-btn");
        const messageList = document.getElementById("message-list");

        closeAdmin.onclick = () => adminModal.style.display = "none";
        window.onclick = (e) => { if (e.target == adminModal) adminModal.style.display = "none"; };

        sendBtn.onclick = async () => {
            const name = document.getElementById("sender-name").value;
            const msg = document.getElementById("sender-msg").value;
            if(!name || !msg) { alert("Please fill all fields."); return; }
            sendBtn.innerText = "Sending...";
            try {
                await addDoc(collection(db, "messages"), { name, message: msg, timestamp: serverTimestamp() });
                sendBtn.innerText = "Message Sent!";
                setTimeout(() => { sendBtn.innerText = "Send Message"; document.getElementById("sender-name").value = ""; document.getElementById("sender-msg").value = ""; }, 2000);
            } catch (e) { alert("Error!"); sendBtn.innerText = "Send Message"; }
        };

        secretDot.onclick = async () => {
            let pass = prompt("Access Code:");
            if (pass === "1845") {
                adminModal.style.display = "flex";
                const q = query(collection(db, "messages"), orderBy("timestamp", "desc"));
                const snap = await getDocs(q);
                messageList.innerHTML = "";
                snap.forEach((doc) => {
                    const d = doc.data();
                    messageList.innerHTML += `<div class="msg-item"><strong>${d.name}</strong><span class="msg-date">${d.timestamp ? d.timestamp.toDate().toLocaleString('tr-TR') : ""}</span>${d.message}</div>`;
                });
            } else if (pass !== null) alert("Access Denied.");
        };
    </script>
</body>
</html>
